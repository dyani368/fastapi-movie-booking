{% extends "layout.html" %}
{% block content %}
<div class="card p-4 shadow-sm" style="max-width: 500px; margin: 0 auto;">
    <h2 class="text-primary mb-4 text-center">Register</h2>

    <form action="{{ url_for('register_html') }}" method="post">
        <!-- Username -->
        <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" name="username" required minlength="3" maxlength="20">
        </div>

        <!-- Email -->
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email" required>
        </div>

        <!-- Password -->
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password" required minlength="6">
        </div>

        <!-- Submit Button -->
        <div class="d-grid mt-4">
            <button type="submit" class="btn btn-primary">Create Account</button>
        </div>
        <div class="text-center mt-3">
            <a href="{{ url_for('root') }}" class="text-decoration-none">Cancel</a>
        </div>
    </form>
</div>
{% endblock content %}
